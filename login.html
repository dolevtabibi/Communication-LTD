<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
	input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    transition: background-color 5000s ease-in-out 0s;
    -webkit-text-fill-color: #fff !important;
}
	</style>
    <link rel="stylesheet" href="login.css" />
    <link rel="icon" type="image/x-icon" href="/images/LTD-logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </head>
  <body>
    <div class="area">
      <ul class="circles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <section>
        <div class="form-box">
          <div class="form-value">
            <form action="/welcome">
              <h2>Login</h2>
              <div class="inputbox">
                <ion-icon name="person"></ion-icon>
                <input type="text" id="fullname" required>
                <label for="fullname">Full Name</label>
              </div>
              <div class="inputbox">
                <ion-icon name="mail-outline"></ion-icon>
                <input type="email" id="email" required>
                <label for="email">Email</label>
              </div>
              <div class="inputbox">
                <div class="password-container">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="password" required>
                    <label for="password">Password</label>
                    <span class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <ion-icon id="password-toggle-icon" name="eye-off"></ion-icon>
                    </span>
                </div>
            </div>
              <button>Login</button>
              <p>Don't have an account <a href="/register.html" id="register-link">Register</a></p>
            </form>
          </div>
        </div>
      </section>
    </div>
    <script src="login.js"></script>
  </body>
</html>
